services:
  db:
    image: postgres:16-alpine
    container_name: mycars_db
    environment:
      POSTGRES_DB: mycars
      POSTGRES_USER: mycars
      POSTGRES_PASSWORD: mycars
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mycars -d mycars"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: my_cars/Dockerfile
    container_name: mycars_backend
    environment:
      DEBUG: "False"
      SECRET_KEY: dev-secret-key-change-in-production
      POSTGRES_DB: mycars
      POSTGRES_USER: mycars
      POSTGRES_PASSWORD: mycars
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./my_cars/media:/app/media
      - ./my_cars/fixtures:/app/fixtures
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000/api
    container_name: mycars_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
